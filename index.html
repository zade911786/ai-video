<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>🎪 Digital Circus AI</title>

<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="stylesheet" href="./css/style.css" />

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#090011;
  color:white;
  font-family:sans-serif;
}

#canvas-container{
  position:fixed;
  inset:0;
}

#loading-screen{
  position:fixed;
  inset:0;
  background:#090011;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  transition:.4s;
}

.loader{
  text-align:center;
}

.loader h1{
  color:#ff5c93;
}

#debug{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-height:40vh;
  overflow:auto;
  background:#111;
  border:1px solid #444;
  padding:10px;
  font-family:monospace;
  font-size:12px;
  z-index:999999;
  white-space:pre-wrap;
}

.hidden{
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="loading-screen">
  <div class="loader">
    <h1>🎪 Digital Circus AI</h1>
    <p>Loading...</p>
  </div>
</div>

<div id="canvas-container"></div>

<div id="debug">BOOTING...\n</div>

<script type="module">

const debug = document.getElementById("debug");

function log(...a){
  console.log(...a);

  debug.textContent += "\n" + a.join(" ");
}

window.onerror = (msg, src, line, col, err)=>{
  log("❌ ERROR:", msg);
  if(err?.stack) log(err.stack);
};

window.onunhandledrejection = e=>{
  log("❌ PROMISE:", e.reason);
};

async function boot(){

  try{

    log("🚀 importing main.js");

    await import("./js/main.js");

    log("✅ main.js loaded");

    setTimeout(()=>{
      const ls = document.getElementById("loading-screen");

      if(ls){
        ls.classList.add("hidden");
      }

      log("✅ loader hidden");
    },1000);

  }catch(err){

    log("❌ IMPORT FAILED");

    log(err);

    if(err?.stack){
      log(err.stack);
    }

  }

}

boot();

</script>

</body>
</html>

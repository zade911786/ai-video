<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Digital Circus AI — Debug Mode</title>

  <style>
    body{
      margin:0;
      background:#0b0b0b;
      color:#fff;
      font-family:monospace;
    }

    #app{
      padding:20px;
    }

    .ok{
      color:#5cff87;
    }

    .warn{
      color:#ffd166;
    }

    .err{
      color:#ff6b6b;
    }

    .box{
      border:1px solid #333;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
      background:#111;
      overflow:auto;
    }

    pre{
      white-space:pre-wrap;
      word-break:break-word;
      font-size:13px;
      line-height:1.5;
    }

    h1,h2{
      margin-top:0;
    }

    .loading{
      color:#4ea8ff;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{opacity:0.5}
      50%{opacity:1}
      100%{opacity:0.5}
    }
  </style>
</head>

<body>

<div id="app">

  <h1>🎪 Digital Circus AI — Debug Loader</h1>

  <div class="box">
    <div id="status" class="loading">
      Loading main.js...
    </div>
  </div>

  <div class="box">
    <h2>📄 Logs</h2>
    <pre id="logs"></pre>
  </div>

  <div class="box">
    <h2>🌐 Environment</h2>
    <pre id="env"></pre>
  </div>

</div>

<script>

const logs = document.getElementById("logs");
const statusEl = document.getElementById("status");

function log(...args){

  console.log(...args);

  logs.textContent += args.map(x => {
    try{
      return typeof x === "object"
        ? JSON.stringify(x, null, 2)
        : String(x);
    }catch{
      return String(x);
    }
  }).join(" ") + "\n";
}

function setStatus(text, cls){

  statusEl.className = cls || "";

  statusEl.textContent = text;
}

document.getElementById("env").textContent =
`
URL: ${location.href}

USER AGENT:
${navigator.userAgent}

SCREEN:
${window.innerWidth} x ${window.innerHeight}

ONLINE:
${navigator.onLine}

TIME:
${new Date().toString()}
`;

window.addEventListener("error", (e)=>{

  setStatus("❌ GLOBAL ERROR", "err");

  log("GLOBAL ERROR:");
  log("message:", e.message);
  log("file:", e.filename);
  log("line:", e.lineno);
  log("column:", e.colno);

  if(e.error){
    log("stack:");
    log(e.error.stack);
  }
});

window.addEventListener("unhandledrejection", (e)=>{

  setStatus("❌ UNHANDLED PROMISE REJECTION", "err");

  log("PROMISE REJECTION:");

  if(e.reason){
    log(e.reason.stack || e.reason);
  }else{
    log("Unknown rejection");
  }
});

(async()=>{

  try{

    log("Starting debug import...");

    const response = await fetch("./js/main.js");

    log("Fetch status:", response.status);

    if(!response.ok){

      setStatus("❌ main.js NOT FOUND", "err");

      log("main.js could not be fetched.");

      return;
    }

    const text = await response.text();

    log("main.js size:", text.length);

    log("First 500 chars:");
    log(text.slice(0, 500));

    if(text.includes("startconst")){

      setStatus("❌ BROKEN JS DETECTED", "err");

      log("Found broken token: startconst");

    }

    if(text.includes("}}// startconst")){

      setStatus("❌ MERGED COMMENT BUG DETECTED", "err");

      log("main.js ending is corrupted.");

    }

    log("Trying dynamic import...");

    const mod = await import("./js/main.js");

    setStatus("✅ MAIN.JS IMPORTED SUCCESSFULLY", "ok");

    log("IMPORT SUCCESS");
    log(mod);

  }catch(err){

    setStatus("❌ IMPORT FAILED", "err");

    log("IMPORT FAILED:");
    log(err.message);

    if(err.stack){
      log(err.stack);
    }

    if(err.cause){
      log("CAUSE:");
      log(err.cause);
    }

    log("");
    log("Possible reasons:");
    log("1. Syntax error in main.js");
    log("2. Broken import path");
    log("3. Missing imported file");
    log("4. Invalid JS encoding");
    log("5. Module MIME issue");
    log("6. Broken comment merge");
    log("7. Another imported module crashed");
  }

})();
</script>

</body>
</html>
